<!-- ambient background + corner pet + easter eggs -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/site-fx.css">

<div id="bg-drift" aria-hidden="true">
  <span></span><span></span><span></span>
</div>

{% if page.url == "/" %}
<div id="site-pet">
  <div id="site-pet-bubble" class="site-pet-bubble" hidden></div>
  <div class="site-pet-walker">
    <span class="site-pet-shadow" aria-hidden="true"></span>
    <span id="site-pet-zzz" class="site-pet-zzz" aria-hidden="true">z</span>
    <button id="site-pet-btn" class="site-pet-sprite" type="button" aria-label="Say hi to Mametchi, the site pet">
      <span id="site-pet-grid" class="site-pet-grid"></span>
    </button>
  </div>
</div>
{% endif %}

<script defer src="{{ base_path }}/assets/js/site-fx.js"></script>
